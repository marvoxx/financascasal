<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#534AB7"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Finanças"/>
<title>Finanças do Casal</title>
<!-- Chart.js para relatórios -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client"></script>
<style>
:root{
  --p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;
  --g:#1D9E75;--gl:#E1F5EE;--gd:#085041;
  --r:#993C1D;--rl:#FAECE7;--a:#BA7517;--al:#FAEEDA;
  --bg:#f2f2f7;--surf:#fff;--bord:rgba(0,0,0,.1);
  --t:#1a1a1a;--t2:#666;--t3:#999;
  --rad:14px;--rads:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0e10;--surf:#1c1c1e;--bord:rgba(255,255,255,.12);
  --t:#f2f2f7;--t2:#ababab;--t3:#555;
  --pl:#2a2660;--gl:#0d3d2e;--al:#3a2a08;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px}
.scr{display:none;flex-direction:column;height:100vh;overflow:hidden}
.scr.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 80px;-webkit-overflow-scrolling:touch}

/* TOPBAR */
.top{background:var(--surf);border-bottom:.5px solid var(--bord);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top h1{font-size:16px;font-weight:700}
.top-r{display:flex;gap:6px;align-items:center}
.ib{background:none;border:.5px solid var(--bord);border-radius:var(--rads);padding:5px 10px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;position:relative}
.ib:active{opacity:.7}
.badge-dot{position:absolute;top:-4px;right:-4px;background:#D85A30;color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* BOTTOM NAV */
.bnav{background:var(--surf);border-top:.5px solid var(--bord);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nv{flex:1;padding:8px 2px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:10px;font-weight:500}
.nv.on{color:var(--p)}
.ni{font-size:20px}

/* CARDS */
.card{background:var(--surf);border-radius:var(--rad);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ml{font-size:12px;color:var(--t2);margin-bottom:3px}
.mv{font-size:21px;font-weight:800}
.mv.pos{color:#0F6E56}.mv.neg{color:var(--r)}
.sec{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* MÊS NAV */
.mnav{background:var(--surf);border-radius:var(--rad);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mnav button{background:none;border:none;font-size:22px;color:var(--t2);padding:0 8px;cursor:pointer}
.mnl{font-size:15px;font-weight:700}

/* EXPENSE ITEMS */
.elist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.ei{background:var(--surf);border:.5px solid var(--bord);border-radius:var(--rad);padding:12px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ei:active{transform:scale(.99)}
.ei.is-new{border-color:var(--p)}
.ei.is-settled{opacity:.55}
.erow{display:flex;align-items:center;gap:9px}
.ci{width:36px;height:36px;border-radius:var(--rads);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ei2{flex:1;min-width:0}
.en{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.em{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:2px}
.ea{text-align:right;flex-shrink:0}
.eat{font-size:14px;font-weight:700}
.eas{font-size:11px;color:var(--t2)}
.edet{display:none;margin-top:9px;border-top:.5px solid var(--bord);padding-top:9px}
.edet.on{display:block}
.sr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sn{font-size:13px;color:var(--t2);flex:1}
.sp{font-size:13px;font-weight:700;width:32px;text-align:right}
.sv{font-size:12px;color:var(--t2);width:60px;text-align:right}
.pt{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.pme{height:100%;border-radius:3px;background:var(--p)}
.psp{height:100%;border-radius:3px;background:var(--g)}
.eacts{display:flex;gap:6px;margin-top:9px}
.ebtn{flex:1;padding:7px;font-size:12px;font-weight:600;border-radius:var(--rads);cursor:pointer;border:.5px solid var(--bord);background:transparent;color:var(--t2)}
.ebtn.del{border-color:#F0997B;color:var(--r)}

/* FAB */
.fab{position:fixed;bottom:72px;right:16px;width:54px;height:54px;border-radius:27px;background:var(--p);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 14px rgba(83,74,183,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(.95)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mod{background:var(--surf);border-radius:20px 20px 0 0;padding:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mh{width:38px;height:4px;background:var(--bord);border-radius:2px;margin:0 auto 14px}
.mt{font-size:17px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}
.fl{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.fi{width:100%;padding:11px 13px;border:.5px solid var(--bord);border-radius:var(--rads);font-size:15px;background:var(--surf);color:var(--t);outline:none}
.fi:focus{border-color:var(--p)}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cb{padding:9px 3px;border:.5px solid var(--bord);border-radius:var(--rads);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;background:var(--surf);text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.cb .ce{font-size:18px}
.cb.on{border:2px solid var(--p);color:var(--p);background:var(--pl)}
.pr{display:flex;gap:8px}
.pb{flex:1;padding:10px;border:.5px solid var(--bord);border-radius:var(--rads);font-size:14px;font-weight:600;cursor:pointer;background:var(--surf);color:var(--t2);display:flex;align-items:center;justify-content:center;gap:7px}
.pb.me{border:2px solid var(--p);color:var(--p);background:var(--pl)}
.pb.sp{border:2px solid var(--g);color:var(--gd);background:var(--gl)}
.slg{margin-bottom:12px}
.sll{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:5px}
.slv{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:5px}
input[type=range]{width:100%;accent-color:var(--p)}
.macts{display:flex;gap:8px;margin-top:14px}
.bc{flex:1;padding:12px;border:.5px solid var(--bord);border-radius:var(--rad);font-size:15px;font-weight:600;color:var(--t2);background:transparent;cursor:pointer}
.bs{flex:2;padding:12px;border:none;border-radius:var(--rad);font-size:15px;font-weight:700;color:#fff;background:var(--p);cursor:pointer}
.bs:active{transform:scale(.98)}
.bs.green{background:var(--g)}

/* AVATAR */
.av{border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden}
.av-p{background:var(--pl);color:var(--pd)}
.av-g{background:var(--gl);color:var(--gd)}

/* BADGES */
.bge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.bge-p{background:var(--pl);color:var(--pd)}
.bge-g{background:var(--gl);color:var(--gd)}
.bge-new{background:var(--al);color:#412402}
.bge-set{background:var(--gl);color:var(--gd)}

/* LOADING / TOAST */
.lov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.lbox{background:var(--surf);border-radius:var(--rad);padding:22px 30px;text-align:center;font-size:15px;font-weight:600}
.lspin{width:30px;height:30px;border:3px solid var(--bord);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 18px;border-radius:30px;font-size:14px;font-weight:500;z-index:600;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}
.empty{text-align:center;padding:36px 20px;color:var(--t2);font-size:14px;line-height:1.7}

/* SETUP */
.setup{display:flex;flex-direction:column;justify-content:center;padding:28px 18px;gap:14px;flex:1;min-height:100%}

/* BALANCE */
.bbar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}
.bfill{height:100%;border-radius:4px;background:var(--p)}
.bstat{font-size:14px;text-align:center;padding:11px;background:var(--bg);border-radius:var(--rads);margin-top:8px}
.setb{background:var(--gl);border-radius:var(--rads);padding:9px;font-size:13px;color:var(--gd);margin-top:9px;text-align:center;font-weight:600}

/* REPORT */
.rtabs,.atabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:12px}
.rt,.at{flex:1;padding:7px 4px;font-size:12px;font-weight:600;text-align:center;border-radius:7px;cursor:pointer;color:var(--t2);border:none;background:transparent}
.rt.on,.at.on{background:var(--surf);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:.5px solid var(--bord);background:var(--surf);color:var(--t2);margin:2px}
.pill.on{background:var(--pl);color:var(--p);border-color:var(--p)}
select.rsel{width:100%;padding:8px 10px;border:.5px solid var(--bord);border-radius:var(--rads);font-size:14px;background:var(--surf);color:var(--t);outline:none}
.rtable{width:100%;border-collapse:collapse;font-size:13px}
.rtable th{text-align:left;padding:8px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;border-bottom:.5px solid var(--bord)}
.rtable td{padding:8px;border-bottom:.5px solid var(--bord)}
.rtable tr:last-child td{border-bottom:none}

/* ADMIN */
.acard{background:var(--surf);border:.5px solid var(--bord);border-radius:var(--rad);padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.acard-info{flex:1;min-width:0}
.acard-info h3{font-size:14px;font-weight:700}
.acard-info p{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adel{background:none;border:none;color:var(--r);font-size:13px;font-weight:600;cursor:pointer;padding:4px 8px;flex-shrink:0}

/* PROFILE */
.profwrap{position:relative;width:80px;margin:0 auto 14px}
.profimg{width:80px;height:80px;border-radius:40px;object-fit:cover;display:block;border:3px solid var(--p)}
.profedit{position:absolute;bottom:0;right:0;background:var(--p);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:none}
</style>
</head>
<body>

<!-- ============ TELA SETUP ============ -->
<div id="scr-setup" class="scr on">
  <div class="scroll">
    <div class="setup">
      <div style="text-align:center">
        <div style="font-size:52px">💰</div>
        <h1 style="font-size:22px;font-weight:800;margin-top:8px">Finanças do Casal</h1>
        <p style="font-size:14px;color:var(--t2);margin-top:6px">Cole a URL do seu Google Apps Script</p>
      </div>
      <div style="background:var(--pl);border-radius:var(--rads);padding:13px;font-size:13px;color:var(--pd);line-height:1.6">
        <strong style="display:block;margin-bottom:4px">Como obter a URL?</strong>
        No Google Sheets: Extensões → Apps Script → Implantar → Nova implantação → App da Web → copie a URL.
      </div>
      <div class="fg">
        <label class="fl">URL do Google Apps Script</label>
        <input class="fi" id="inp-url" type="url" placeholder="https://script.google.com/macros/s/..."/>
      </div>
      <button class="bs" onclick="salvarConfig()">Salvar e continuar</button>
      <p style="font-size:12px;color:var(--t3);text-align:center">A URL é salva apenas neste dispositivo</p>
    </div>
  </div>
</div>

<!-- ============ TELA LOGIN ============ -->
<div id="scr-login" class="scr">
  <div class="scroll">
    <div class="setup">
      <div style="text-align:center">
        <div style="font-size:52px">💰</div>
        <h1 style="font-size:22px;font-weight:800;margin-top:8px">Finanças do Casal</h1>
        <p style="font-size:14px;color:var(--t2);margin-top:6px;margin-bottom:4px">Entre com sua conta Google</p>
      </div>
      <div id="gsi-btn" style="display:flex;justify-content:center;min-height:46px"></div>
      <p id="login-msg" style="font-size:13px;color:var(--r);text-align:center;min-height:18px"></p>
      <button onclick="mudarConfig()" style="background:none;border:none;font-size:13px;color:var(--t3);cursor:pointer;text-align:center;margin-top:4px">Alterar URL do script</button>
    </div>
  </div>
</div>

<!-- ============ TELA PRINCIPAL ============ -->
<div id="scr-main" class="scr">
  <div class="top">
    <div style="display:flex;align-items:center;gap:9px">
      <div id="top-av" class="av av-p" style="width:32px;height:32px;font-size:12px">?</div>
      <h1 id="top-nome">Finanças</h1>
    </div>
    <div class="top-r">
      <button class="ib" onclick="irTab('notif')">🔔<span id="n-count" class="badge-dot" style="display:none">0</span></button>
      <button class="ib" onclick="irTab('perfil')">Perfil</button>
      <button class="ib" onclick="sair()">Sair</button>
    </div>
  </div>
  <div id="tab-cont" class="scroll"></div>
  <button class="fab" id="fab" onclick="abrirAdd()" style="display:none">+</button>
  <nav class="bnav">
    <button class="nv on" id="nav-despesas"  onclick="irTab('despesas')"><span class="ni">💳</span>Despesas</button>
    <button class="nv"    id="nav-balanco"   onclick="irTab('balanco')"><span class="ni">⚖️</span>Balanço</button>
    <button class="nv"    id="nav-historico" onclick="irTab('historico')"><span class="ni">📅</span>Histórico</button>
    <button class="nv"    id="nav-relatorio" onclick="irTab('relatorio')"><span class="ni">📊</span>Relatório</button>
    <button class="nv"    id="nav-admin"     onclick="irTab('admin')" style="display:none"><span class="ni">🔑</span>Admin</button>
  </nav>
</div>

<!-- Modal -->
<div id="mbg" class="mbg" style="display:none" onclick="fecharSeExt(event)">
  <div class="mod" id="mod-inner"><div class="mh"></div></div>
</div>
<!-- Loading -->
<div id="lov" class="lov" style="display:none">
  <div class="lbox"><div class="lspin"></div><span id="lov-msg">Carregando...</span></div>
</div>
<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ================================================================
//  ⚠️  ALTERE COM SEU CLIENT ID DO GOOGLE CLOUD
// ================================================================
const CLIENT_ID = "484700340283-i6asp28o915s2qn4or4nof2tpochcuer.apps.googleusercontent.com";

// ================================================================
//  CONSTANTES
// ================================================================
const K_URL   = "fc_url";
const K_TOKEN = "fc_token";
const K_EMAIL = "fc_email";
const K_SEEN  = "fc_seen_";

const CATS = [
  {id:"mercado",   label:"Mercado",    emoji:"🛒", bg:"#EEEDFE", bar:"#534AB7"},
  {id:"contas",    label:"Contas",     emoji:"💡", bg:"#E6F1FB", bar:"#378ADD"},
  {id:"lazer",     label:"Lazer",      emoji:"🎉", bg:"#FAEEDA", bar:"#BA7517"},
  {id:"saude",     label:"Saúde",      emoji:"💊", bg:"#E1F5EE", bar:"#1D9E75"},
  {id:"transporte",label:"Transporte", emoji:"🚗", bg:"#F1EFE8", bar:"#5F5E5A"},
  {id:"outros",    label:"Outros",     emoji:"📦", bg:"#FCEBEB", bar:"#993C1D"}
];
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

// ================================================================
//  ESTADO GLOBAL
// ================================================================
let G = {
  url:"", token:"", email:"", profile:{}, isAdmin:false,
  tab:"despesas",
  vm: new Date().getMonth()+1, vy: new Date().getFullYear(),
  expenses:[], settlements:[], payments:[], grupos:[], users:[],
  openExp:null, openHist:null, editId:null,
  seenIds: new Set(),
  form:{desc:"",val:"",cat:"mercado",grupo:"",payer:"",pct:50},
  // Relatório
  rStart:"", rEnd:"", rGran:"month", rType:"bar",
  rMetric:"total", rDim:"cat", rView:"chart",
  rData:null, rChart:null,
  // Admin
  adminTab:"grupos", aEmails:[], aAdmins:[]
};

// ================================================================
//  INIT
// ================================================================
window.addEventListener("load", () => {
  G.url   = localStorage.getItem(K_URL)   || "";
  G.token = localStorage.getItem(K_TOKEN) || "";
  G.email = localStorage.getItem(K_EMAIL) || "";
  if (!G.url) { mostrar("scr-setup"); return; }
  if (G.token) { autoLogin(); return; }
  mostrar("scr-login");
  setTimeout(initGSI, 300);
});

function mostrar(id) {
  document.querySelectorAll(".scr").forEach(s => s.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

// ================================================================
//  CONFIGURAÇÃO
// ================================================================
function salvarConfig() {
  const url = document.getElementById("inp-url").value.trim();
  if (!url.startsWith("https://")) { toast("URL inválida"); return; }
  G.url = url;
  localStorage.setItem(K_URL, url);
  mostrar("scr-login");
  setTimeout(initGSI, 300);
}
function mudarConfig() {
  mostrar("scr-setup");
  document.getElementById("inp-url").value = G.url;
}

// ================================================================
//  GOOGLE SIGN-IN
// ================================================================
function initGSI() {
  if (!window.google || !google.accounts) { setTimeout(initGSI, 400); return; }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback : onGToken,
    ux_mode  : "popup"
  });
  google.accounts.id.renderButton(
    document.getElementById("gsi-btn"),
    { theme:"outline", size:"large", width:280, locale:"pt-BR" }
  );
  google.accounts.id.prompt(() => {});
}

async function onGToken(resp) {
  const idToken = resp.credential;
  loginMsg("Verificando acesso...");
  load("Verificando...");
  try {
    const res = await api({ action:"googleLogin", idToken });
    if (!res.ok) { loginMsg(res.error || "Acesso negado"); hideLoad(); return; }
    salvarSessao(res);
    loginMsg("");
    entrarApp();
  } catch(e) {
    loginMsg("Erro de conexão. Verifique a URL do script.");
    console.error(e);
  } finally { hideLoad(); }
}

async function autoLogin() {
  load("Verificando sessão...");
  try {
    const res = await api({ action:"checkAuth", token: G.token });
    if (!res.ok) { clearSessao(); mostrar("scr-login"); setTimeout(initGSI,300); hideLoad(); return; }
    G.profile = res.profile || {};
    G.isAdmin  = res.isAdmin || false;
    entrarApp();
  } catch(e) {
    clearSessao(); mostrar("scr-login"); setTimeout(initGSI,300);
  } finally { hideLoad(); }
}

function salvarSessao(res) {
  G.token   = res.token;
  G.email   = res.email;
  G.profile = res.profile || {};
  G.isAdmin  = res.isAdmin || false;
  localStorage.setItem(K_TOKEN, G.token);
  localStorage.setItem(K_EMAIL, G.email);
}
function clearSessao() {
  localStorage.removeItem(K_TOKEN);
  G.token = ""; G.email = ""; G.profile = {}; G.isAdmin = false;
}

function sair() {
  clearSessao();
  G.expenses = []; G.settlements = []; G.payments = []; G.grupos = []; G.aEmails = []; G.aAdmins = [];
  mostrar("scr-login");
  setTimeout(initGSI, 200);
}

function entrarApp() {
  mostrar("scr-main");
  atualizarTop();
  if (G.isAdmin) document.getElementById("nav-admin").style.display = "";
  carregarSeenIds();
  Promise.all([fetchDespesas(), fetchAcertos(), fetchPagamentos(), fetchGrupos()]).then(() => {
    irTab("despesas");
  });
}

// ================================================================
//  API
// ================================================================
async function api(body) {
  const r = await fetch(G.url, {
    method: "POST",
    headers: { "Content-Type": "text/plain" }, // evita preflight CORS
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

//  FETCH DATA
// ================================================================
async function fetchDespesas() {
  try {
    const r = await api({ action:"getExpenses", token:G.token });
    if (r.ok) G.expenses = r.expenses || [];
    atualizarNotif();
  } catch(e) { console.error("fetchDespesas", e); }
}

// ================================================================
//  NAVEGAÇÃO
// ================================================================
function irTab(tab) {
  G.tab = tab; G.openExp = null;
  ["despesas","balanco","historico","relatorio","admin","notif","perfil"].forEach(t => {
    const n = document.getElementById("nav-" + t);
    if (n) n.classList.toggle("on", t === tab);
  });
  document.getElementById("fab").style.display = tab === "despesas" ? "flex" : "none";
  renderTab();
}

function renderTab() {
  const el = document.getElementById("tab-cont");
  el.scrollTop = 0;
  if (G.tab === "despesas")  el.innerHTML = renderDespesas();
  else if (G.tab === "balanco")   el.innerHTML = renderBalanco();
  else if (G.tab === "historico") el.innerHTML = renderHistorico();
  else if (G.tab === "relatorio") { el.innerHTML = renderRelFiltros(); carregarRelatorio(); }
  else if (G.tab === "notif")     { el.innerHTML = renderNotif(); marcarLidas(); }
  else if (G.tab === "perfil")    el.innerHTML = renderPerfil();
  else if (G.tab === "admin")     renderAdmin(el);
}

function renderDespesas() {
  const exps = expDoMes(G.vy, G.vm);
  const {total, saldo} = calcSaldo(exps);
  const sc = saldo > .01 ? "pos" : saldo < -.01 ? "neg" : "";
  return `
    ${navMes()}
    <div class="grid2">
      <div class="card"><div class="ml">Total gasto</div><div class="mv">${fmt(total)}</div></div>
      <div class="card"><div class="ml">Saldo</div><div class="mv ${sc}">${Math.abs(saldo) < .01 ? "Quites" : fmt(Math.abs(saldo))}</div></div>
    </div>
    <p class="sec">Despesas do mês</p>
    <div class="elist">${exps.length ? exps.map(itemExp).join("") : '<div class="empty">Nenhuma despesa este mês.<br>Toque em + para adicionar.</div>'}</div>
    <div style="height:10px"></div>`;
}

function itemExp(e) {
  const c    = catById(e.cat);
  const mine = G.email;
  const isNew  = e.addedBy !== mine && !G.seenIds.has(e.id);
  const open   = G.openExp === e.id;
  const pme    = e.val * e.pctMe / 100;
  const autor  = nomeUsuario(e.addedBy);
  // Busca grupo para exibir ícone e cor
  const grObj  = e.grupo ? G.grupos.find(g => g.id === e.grupo) : null;
  const grTag  = grObj
    ? `<span style="background:${grObj.cor}22;color:${grObj.cor};border:.5px solid ${grObj.cor}44;border-radius:20px;font-size:10px;font-weight:700;padding:1px 7px;white-space:nowrap">${grObj.icone} ${esc(grObj.nome)}</span>`
    : "";
  return `<div class="ei${isNew?" is-new":""}${e.settled?" is-settled":""}" onclick="toggleExp('${esc(e.id)}')">
    <div class="erow">
      <div class="ci" style="background:${c.bg}">${c.emoji}</div>
      <div class="ei2">
        <div class="en">${esc(e.desc)}${isNew?` <span class="bge bge-new">Novo</span>`:""}${e.settled?` <span class="bge bge-set">✅</span>`:""}</div>
        <div class="em">${grTag}${grTag?" · ":""}${c.label} · ${fmtD(e.date)} · <span class="bge bge-p" style="font-size:10px">${autor}</span></div>
      </div>
      <div class="ea"><div class="eat">${fmt(e.val)}</div><div class="eas">Minha: ${fmt(pme)}</div></div>
    </div>
    <div class="edet${open?" on":""}">
      <div class="sr">
        <div class="av av-p" style="width:24px;height:24px;font-size:9px">EU</div>
        <div class="sn">Eu${e.payer===mine?" (paguei)":""}</div>
        <div class="pt"><div class="pme" style="width:${e.pctMe}%"></div></div>
        <div class="sp">${e.pctMe}%</div><div class="sv">${fmt(e.val*e.pctMe/100)}</div>
      </div>
      <div class="sr">
        <div class="av av-g" style="width:24px;height:24px;font-size:9px">EL</div>
        <div class="sn">Ela${e.payer!==mine&&e.payer?" (pagou)":""}</div>
        <div class="pt"><div class="psp" style="width:${100-e.pctMe}%"></div></div>
        <div class="sp">${100-e.pctMe}%</div><div class="sv">${fmt(e.val*(100-e.pctMe)/100)}</div>
      </div>
      <div class="eacts">
        <button class="ebtn" onclick="editarExp(event,'${esc(e.id)}')">Editar</button>
        ${!e.settled ? `<button class="ebtn" style="color:#0F6E56;border-color:#9FE1CB" onclick="quitarUma(event,'${esc(e.id)}','${esc(e.desc)}')">Quitar</button>` : ""}
        <button class="ebtn del" onclick="apagarExp(event,'${esc(e.id)}')">Excluir</button>
      </div>
    </div>
  </div>`;
}

function renderBalanco() {
  const exps  = expDoMes(G.vy, G.vm);
  const todos = G.expenses; // todas as despesas para saldo global
  const {total, dMe, dSp, saldo} = calcSaldo(exps);
  const {saldo: saldoGlobal}     = calcSaldo(todos);

  const pct = total > 0 ? Math.round(dMe/total*100) : 50;
  const mk  = mkey(G.vy, G.vm);
  const set = G.settlements.find(s => s.month === mk);
  const qCt = exps.filter(e => e.settled).length;

  // Identifica devedor/credor do mês
  // saldo > 0 → ela me deve; saldo < 0 → eu devo a ela
  const euDevo    = saldo < -.01;
  const elaDeve   = saldo >  .01;
  const saldoAbs  = Math.abs(saldo);
  const devedorNome   = euDevo  ? "Você"  : "Ela";
  const credorNome    = euDevo  ? "Ela"   : "Você";
  const devedorCor    = euDevo  ? "var(--r)" : "#0F6E56";
  const devedorIcone  = euDevo  ? "av-p"    : "av-g";
  const credorIcone   = euDevo  ? "av-g"    : "av-p";

  // Pagamentos do mês atual para o histórico
  const pagsMes = G.payments.filter(p => p.data && p.data.startsWith(mk));

  // Categorias do mês
  const byCat = {};
  exps.forEach(e => {
    if(!byCat[e.cat]) byCat[e.cat]={t:0,n:0,s:0};
    byCat[e.cat].t+=e.val; byCat[e.cat].n++;
    if(e.settled) byCat[e.cat].s+=e.val;
  });
  const cats = Object.entries(byCat).sort((a,b)=>b[1].t-a[1].t);

  return `
    ${navMes()}

    <!-- Card saldo do mês -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:7px">
          <div class="av av-p" style="width:26px;height:26px;font-size:9px">EU</div>
          <span style="font-size:14px;font-weight:700">Eu</span>
        </div>
        <span style="font-size:13px;color:var(--t2)">${fmt(total)} total</span>
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:14px;font-weight:700">Ela</span>
          <div class="av av-g" style="width:26px;height:26px;font-size:9px">EL</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--t2)">
        <span>${fmt(dMe)}</span><span>${fmt(dSp)}</span>
      </div>
      <div class="bbar"><div class="bfill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--t2);text-align:center;margin-top:6px">
        ${qCt} de ${exps.length} despesas quitadas individualmente
      </div>
      ${set ? `<div class="setb">✅ Quitado em ${fmtD(set.settledDate)} · ${set.expenseCount||0} despesas · ${fmt(set.totalValue||0)}</div>` : ""}
    </div>

    <!-- Card devedor — destaque visual -->
    ${Math.abs(saldo) > .01 ? `
    <div class="card" style="margin-bottom:12px;border:.5px solid ${devedorCor}30;background:${euDevo?"var(--rl)":"var(--gl)"}">
      <p class="sec" style="margin-bottom:10px">Quem deve o quê</p>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="av ${devedorIcone}" style="width:42px;height:42px;font-size:14px">${euDevo?"EU":"EL"}</div>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--t2)">${devedorNome} deve para ${credorNome}</div>
          <div style="font-size:22px;font-weight:800;color:${devedorCor}">${fmt(saldoAbs)}</div>
        </div>
        <div class="av ${credorIcone}" style="width:42px;height:42px;font-size:14px">${euDevo?"EL":"EU"}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="bs green" style="flex:2;padding:11px" onclick="abrirModalPagamento(${saldoAbs.toFixed(2)}, '${euDevo?"eu":"ela"}')">
          💳 Registrar pagamento
        </button>
        <button class="bs" style="flex:1;padding:11px" onclick="abrirModalQuitacao()">
          ✅ Quitar despesas
        </button>
      </div>
    </div>` : `
    <div class="card" style="margin-bottom:12px;border:.5px solid #1D9E7530;background:var(--gl)">
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:24px;margin-bottom:4px">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--gd)">Vocês estão quites este mês!</div>
      </div>
    </div>`}

    <!-- Histórico de pagamentos do mês -->
    ${pagsMes.length ? `
    <p class="sec">Pagamentos registrados — ${MESES[G.vm-1]}</p>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">
      ${pagsMes.map(p => {
        const euPaguei = p.pagador === G.email;
        return `<div class="card" style="padding:12px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:38px;height:38px;border-radius:50%;background:${euPaguei?"var(--pl)":"var(--gl)"};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">💸</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700">${euPaguei?"Você pagou para ela":"Ela pagou para você"}</div>
              <div style="font-size:12px;color:var(--t2)">${fmtD(p.data)} · ${p.despesasQuitadas} despesa${p.despesasQuitadas!==1?"s":""} quitada${p.despesasQuitadas!==1?"s":""}</div>
              ${p.obs ? `<div style="font-size:12px;color:var(--t2);font-style:italic">"${esc(p.obs)}"</div>` : ""}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:15px;font-weight:800;color:${euPaguei?"var(--r)":"#0F6E56"}">${euPaguei?"-":"+"} ${fmt(p.valor)}</div>
              <div style="font-size:11px;color:var(--t2)">Saldo: ${fmt(p.saldoDepois)}</div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>` : ""}

    <!-- Por categoria -->
    ${cats.length ? `<p class="sec">Por categoria</p>` : ""}
    ${cats.map(([cid,d])=>{
      const c=catById(cid);
      const pct2=total>0?Math.round(d.t/total*100):0;
      const spct=d.t>0?Math.round(d.s/d.t*100):0;
      return `<div class="card" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">
          <div class="ci" style="background:${c.bg};width:30px;height:30px;font-size:13px">${c.emoji}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${c.label}</div>
            <div style="font-size:12px;color:var(--t2)">${d.n} despesa${d.n>1?"s":""} · ${spct}% quitado</div>
          </div>
          <div style="font-size:14px;font-weight:700">${fmt(d.t)}</div>
          <div style="font-size:12px;color:var(--t2);min-width:30px;text-align:right">${pct2}%</div>
        </div>
        <div class="bbar" style="height:5px"><div class="bfill" style="width:${pct2}%;background:${c.bar}"></div></div>
      </div>`;
    }).join("")}`;
}

function renderHistorico() {
  const byMonth = {};
  G.expenses.forEach(e => { const k=e.date.substring(0,7); if(!byMonth[k])byMonth[k]=[]; byMonth[k].push(e); });
  const months = Object.keys(byMonth).sort().reverse();
  if (!months.length) return '<div class="empty">Nenhum histórico ainda.</div>';
  return "<p class='sec'>Por mês</p>" + months.map(k => {
    const [y,m] = k.split("-").map(Number);
    const exps  = byMonth[k];
    const {total, saldo} = calcSaldo(exps);
    const set   = G.settlements.find(s => s.month === k);
    const open  = G.openHist === k;
    const sc    = saldo>.01?"#0F6E56":saldo<-.01?"var(--r)":"var(--t3)";
    const qCt   = exps.filter(e=>e.settled).length;
    return `<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="toggleHist('${k}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:15px;font-weight:700">${MESES[m-1]} ${y}</div>
          <div style="font-size:12px;color:var(--t2);margin-top:2px">${exps.length} despesas · ${qCt} quitadas</div></div>
        <div style="text-align:right"><div style="font-size:15px;font-weight:700">${fmt(total)}</div>
          <div style="font-size:12px;font-weight:600;color:${sc}">${saldo>.01?"Crédito "+fmt(saldo):saldo<-.01?"Débito "+fmt(Math.abs(saldo)):"Quites"}</div></div>
      </div>
      ${set?`<div class="setb" style="margin-top:8px">✅ Quitado em ${fmtD(set.settledDate)}</div>`:""}
      <div style="display:${open?"block":"none"};margin-top:10px;border-top:.5px solid var(--bord);padding-top:10px">
        ${exps.map(e=>{const c=catById(e.cat);return`<div style="display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:.5px solid var(--bord)">
          <div class="ci" style="background:${c.bg};width:28px;height:28px;font-size:12px">${c.emoji}</div>
          <div style="flex:1;font-size:13px">${esc(e.desc)}${e.settled?" ✅":""}</div>
          <div style="font-size:13px;font-weight:700">${fmt(e.val)}</div>
        </div>`}).join("")}
        <button onclick="irMes(event,${y},${m})" style="margin-top:10px;width:100%;padding:10px;background:var(--pl);color:var(--p);border:none;border-radius:var(--rads);font-size:14px;font-weight:700;cursor:pointer">Ver detalhes →</button>
      </div>
    </div>`;
  }).join("");
}

async function renderAdmin(el) {
  if (!G.aEmails.length && !G.aAdmins.length) {
    load("Carregando admin...");
    try {
      const [ae, ad, us] = await Promise.all([
        api({action:"getAllowedEmails", token:G.token}),
        api({action:"getAdmins",        token:G.token}),
        api({action:"getAllUsers",       token:G.token})
      ]);
      G.aEmails = ae.emails || [];
      G.aAdmins = ad.admins || [];
      G.users   = us.users  || [];
    } catch(e) { toast("Erro ao carregar admin"); }
    finally { hideLoad(); }
  }
  // Grupos são sempre relidos (podem ter mudado)
  await fetchGrupos();
  el.innerHTML = htmlAdmin();
}

async function carregarRelatorio() {
  load("Carregando relatório...");
  try {
    const r = await api({ action:"getReportData", token:G.token, startDate:G.rStart, endDate:G.rEnd, granularity:G.rGran });
    if (r.ok) { G.rData = r; renderRelChart(); }
    else toast("Erro: " + (r.error||"desconhecido"));
  } catch(e) { toast("Erro ao carregar relatório"); console.error(e); }
  finally { hideLoad(); }
}

function renderRelChart() {
  const out = document.getElementById("rel-out");
  if (!out) return;

  if (!G.rData) {
    out.innerHTML = '<div class="empty">Clique em "Atualizar relatório" para carregar os dados.</div>';
    return;
  }

  if (G.rView === "table")  { out.innerHTML = htmlRelTabela();  return; }
  if (G.rView === "resumo") { out.innerHTML = htmlRelResumo();  return; }

  // Gráfico
  if (G.rChart) { try{G.rChart.destroy();}catch(e){} G.rChart=null; }
  const series = G.rData.series || [];
  if (!series.length) {
    out.innerHTML = '<div class="empty">Sem dados para o período selecionado.<br>Verifique as datas e clique em Atualizar.</div>';
    return;
  }

  const isPie  = G.rType === "pie" || G.rType === "doughnut";
  out.innerHTML = `<div class="card" style="margin-bottom:10px"><canvas id="rchart" style="max-height:280px"></canvas></div>`;

  // Aguarda o DOM renderizar antes de criar o canvas
  requestAnimationFrame(() => {
    const canvas = document.getElementById("rchart");
    if (!canvas) return;
    const isDark = window.matchMedia("(prefers-color-scheme:dark)").matches;
    const tc = isDark ? "#ababab" : "#666";

    if (isPie) {
      const agg = {};
      series.forEach(s => {
        const src = G.rDim==="cat" ? s.byCat : G.rDim==="grupo" ? s.byGrupo : G.rDim==="user" ? s.byUser : s.byPayer;
        Object.entries(src||{}).forEach(([k,v]) => {
          if (!agg[k]) agg[k] = 0;
          agg[k] += (typeof v==="object" ? (v[G.rMetric]||v.total||0) : v) || 0;
        });
      });
      const labels=[],data=[],colors=[];
      const pal=["#534AB7","#1D9E75","#BA7517","#378ADD","#993C1D","#888780"];
      Object.entries(agg).forEach(([k,v],i) => {
        const c   = G.rDim==="cat" ? catById(k) : null;
        const grp = G.rDim==="grupo" ? G.grupos.find(g=>g.id===k) : null;
        labels.push(grp ? grp.icone+" "+grp.nome : c ? c.label : k.split("@")[0]);
        data.push(parseFloat(Number(v).toFixed(2)));
        colors.push(grp ? grp.cor : c ? c.bar : pal[i%pal.length]);
      });
      G.rChart = new Chart(canvas, {
        type: G.rType,
        data: { labels, datasets:[{data, backgroundColor:colors}] },
        options:{ responsive:true, plugins:{ legend:{display:true,position:"bottom",labels:{color:tc,font:{size:11},padding:10,boxWidth:12}} } }
      });
      return;
    }

    // Barras / Linha
    const labels = series.map(s => s.label);
    let datasets = [];

    if (G.rDim === "cat") {
      const allCats = new Set();
      series.forEach(s => Object.keys(s.byCat||{}).forEach(c => allCats.add(c)));
      datasets = Array.from(allCats).map(cid => {
        const c = catById(cid);
        return {
          label: c.label,
          data: series.map(s => { const d=s.byCat&&s.byCat[cid]; return d?(d[G.rMetric]||0):0; }),
          backgroundColor: c.bar+"88", borderColor: c.bar, borderWidth:2, fill:false, tension:.3
        };
      });
    } else if (G.rDim === "grupo") {
      const allGrupos = new Set();
      series.forEach(s => Object.keys(s.byGrupo||{}).forEach(k => allGrupos.add(k)));
      const pal = ["#534AB7","#1D9E75","#BA7517","#378ADD","#993C1D","#888780"];
      datasets = Array.from(allGrupos).map((gid, i) => {
        const grp = G.grupos.find(g => g.id === gid);
        const cor = grp ? grp.cor : pal[i%pal.length];
        const lbl = grp ? grp.icone + " " + grp.nome : gid;
        return {
          label: lbl,
          data: series.map(s => { const d=s.byGrupo&&s.byGrupo[gid]; return d?(d[G.rMetric]||0):0; }),
          backgroundColor: cor+"88", borderColor: cor, borderWidth:2, fill:false, tension:.3
        };
      });
    } else {
      const allK = new Set();
      series.forEach(s => Object.keys((G.rDim==="user"?s.byUser:s.byPayer)||{}).forEach(k => allK.add(k)));
      const pal = ["#534AB7","#1D9E75","#BA7517","#378ADD","#993C1D"];
      datasets = Array.from(allK).map((k,i) => ({
        label: k.split("@")[0],
        data: series.map(s => { const src=G.rDim==="user"?s.byUser:s.byPayer; return src&&src[k]?(typeof src[k]==="object"?src[k].total:src[k]):0; }),
        backgroundColor: pal[i%pal.length]+"88", borderColor: pal[i%pal.length], borderWidth:2, fill:false, tension:.3
      }));
    }

    if (!datasets.length) {
      datasets = [{ label:{total:"Total",settled:"Quitado",pending:"Pendente"}[G.rMetric], data:series.map(s=>s[G.rMetric]||0), backgroundColor:"#534AB788", borderColor:"#534AB7", borderWidth:2, fill:false, tension:.3 }];
    }

    G.rChart = new Chart(canvas, {
      type: G.rType,
      data: { labels, datasets },
      options:{
        responsive:true,
        plugins:{ legend:{display:true,position:"bottom",labels:{color:tc,font:{size:11},padding:10,boxWidth:12}} },
        scales:{
          x:{ ticks:{color:tc,font:{size:11}}, grid:{color:isDark?"rgba(255,255,255,.05)":"rgba(0,0,0,.05)"} },
          y:{ ticks:{color:tc,font:{size:11},callback:v=>"R$"+Number(v).toFixed(0)}, grid:{color:isDark?"rgba(255,255,255,.05)":"rgba(0,0,0,.05)"} }
        }
      }
    });
  });
}

  if (!s||!s.length) return '<div class="empty">Sem dados.</div>';
  const tt=s.reduce((a,r)=>a+r.total,0), ts=s.reduce((a,r)=>a+r.settled,0);
  return `<div class="card" style="overflow-x:auto">
    <table class="rtable">
      <tr><th>Período</th><th style="text-align:right">Total</th><th style="text-align:right">Quitado</th><th style="text-align:right">Pendente</th><th style="text-align:right">Qtd</th></tr>
      ${s.map(r=>`<tr><td>${r.label}</td><td style="text-align:right;font-weight:700">${fmt(r.total)}</td><td style="text-align:right;color:#0F6E56">${fmt(r.settled)}</td><td style="text-align:right;color:var(--r)">${fmt(r.pending)}</td><td style="text-align:right;color:var(--t2)">${r.count}</td></tr>`).join("")}
      <tr style="background:var(--bg)"><td><strong>Total</strong></td><td style="text-align:right;font-weight:700">${fmt(tt)}</td><td style="text-align:right;color:#0F6E56;font-weight:700">${fmt(ts)}</td><td style="text-align:right;color:var(--r);font-weight:700">${fmt(tt-ts)}</td><td style="text-align:right;font-weight:700">${s.reduce((a,r)=>a+r.count,0)}</td></tr>
    </table></div>`;
}

function htmlRelResumo() {

        const cor = grp ? grp.cor : "#888780";

        const pct = sm.total>0?Math.round(d.total/sm.total*100):0;

            <div style="flex:1"><div style="font-size:14px;font-weight:700">${esc(lbl.replace(/^.+? /,""))}</div>
              <div style="font-size:12px;color:var(--t2)">${d.count} despesa${d.count!==1?"s":""}</div></div>

        </div>`;
      }).join("")}`
    : "";

  return `<div class="grid2" style="margin-bottom:10px">
    <div class="card"><div class="ml">Total</div><div class="mv">${fmt(sm.total||0)}</div></div>
    <div class="card"><div class="ml">Quitado</div><div class="mv pos">${fmt(sm.settled||0)}</div></div>
    <div class="card"><div class="ml">Pendente</div><div class="mv neg">${fmt(sm.pending||0)}</div></div>
    <div class="card"><div class="ml">Despesas</div><div class="mv">${sm.count||0}</div></div>
  </div>
  ${blocoGrupos}
  <p class="sec" style="margin-top:4px">Por categoria</p>
  ${Object.entries(sm.byCat||{}).sort((a,b)=>b[1].total-a[1].total).map(([cid,d])=>{
    const c=catById(cid);const pct=sm.total>0?Math.round(d.total/sm.total*100):0;
    return`<div class="card" style="margin-bottom:7px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
        <div class="ci" style="background:${c.bg};width:30px;height:30px;font-size:13px">${c.emoji}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:700">${c.label}</div>
          <div style="font-size:12px;color:var(--t2)">${d.count} despesas</div></div>
        <div style="text-align:right"><div style="font-size:14px;font-weight:700">${fmt(d.total)}</div>
          <div style="font-size:11px;color:#0F6E56">${fmt(d.settled)} quitado</div></div>
      </div>
      <div class="bbar" style="height:5px"><div class="bfill" style="width:${pct}%;background:${c.bar}"></div></div>
    </div>`;
  }).join("")}`;
}

function pickCat(id) {
  G.form.cat = id;
  document.querySelectorAll("#f-cats .cb").forEach(b => b.classList.remove("on"));
  event.currentTarget.classList.add("on");
}
function pickPayer(p) {
  G.form.payer = p === "eu" ? G.email : "outra";
  document.getElementById("pb-eu").className  = "pb" + (p==="eu"?" me":"");
  document.getElementById("pb-ela").className = "pb" + (p==="ela"?" sp":"");
}
function updPct(v) {
  G.form.pct = parseInt(v);
  document.getElementById("lbl-me").textContent  = v + "%";
  document.getElementById("lbl-ela").textContent = (100-parseInt(v)) + "%";
}
function fecharModal() { document.getElementById("mbg").style.display = "none"; G.editId = null; }
function fecharSeExt(e) { if (e.target === document.getElementById("mbg")) fecharModal(); }

async function salvarExp() {
  const desc  = document.getElementById("f-desc").value.trim();
  const val   = parseFloat(document.getElementById("f-val").value);
  const grupo = document.getElementById("f-grupo") ? document.getElementById("f-grupo").value : G.form.grupo;
  if (!desc || isNaN(val) || val <= 0) { toast("Preencha descrição e valor"); return; }

  const payload = { desc, val, cat:G.form.cat, grupo, payer:G.form.payer, pctMe:G.form.pct, date:hoje() };
  load(G.editId ? "Atualizando..." : "Salvando...");
  try {
    if (G.editId) {
      const r = await api({ action:"editExpense", token:G.token, id:G.editId, ...payload });
      if (!r.ok) { toast(r.error||"Erro ao editar"); return; }
      const idx = G.expenses.findIndex(e => e.id === G.editId);
      if (idx > -1) G.expenses[idx] = { ...G.expenses[idx], ...payload };
      toast("Despesa atualizada ✓");
    } else {
      const r = await api({ action:"addExpense", token:G.token, ...payload });
      if (!r.ok) { toast(r.error||"Erro ao salvar"); return; }
      G.expenses.unshift({ ...payload, id:r.id, addedBy:G.email, settled:false });
      toast("Despesa adicionada ✓");
    }
    fecharModal();
    renderTab();
  } catch(e) { toast("Erro de conexão. Verifique o script."); console.error(e); }
  finally { hideLoad(); }
}

async function quitarUma(ev, id, desc) {
  ev.stopPropagation();
  if (!confirm(`Quitar "${desc}"?`)) return;
  const e  = G.expenses.find(x => x.id === id);
  const mk = e ? e.date.substring(0, 7) : mkey(G.vy, G.vm);
  load("Quitando...");
  try {
    const r = await api({ action:"settleExpenses", token:G.token, ids:[id], month:mk });
    if (!r.ok) { toast(r.error || "Erro"); return; }
    const exp = G.expenses.find(x => x.id === id);
    if (exp) { exp.settled = true; exp.settledAt = hoje(); exp.settledMonth = mk; }
    toast("✅ Despesa quitada");
    G.openExp = null;
    renderTab();
  } catch(e) { toast("Erro de conexão"); console.error(e); }
  finally { hideLoad(); }
}
  ev.stopPropagation();
  if (!confirm("Excluir esta despesa?")) return;
  load("Excluindo...");
  try {
    const r = await api({ action:"deleteExpense", token:G.token, id });
    if (!r.ok) { toast(r.error||"Erro"); return; }
    G.expenses = G.expenses.filter(e => e.id !== id);
    G.openExp = null;
    toast("Excluída");
    renderTab();
  } catch(e) { toast("Erro de conexão"); }
  finally { hideLoad(); }
}

function atualizarPreviewPag(valorStr, saldoTotal) {
  const el = document.getElementById("pag-preview");
  if (!el) return;
  const val = parseFloat(valorStr) || 0;
  const st  = parseFloat(saldoTotal) || 0;
  if (val <= 0) { el.textContent = "Informe um valor válido."; return; }

  // Simula quantas despesas seriam quitadas (das mais antigas pendentes)
  const pendentes = G.expenses
    .filter(e => !e.settled)
    .sort((a,b) => a.date < b.date ? -1 : 1);

  let acum = 0, count = 0;
  for (const e of pendentes) {
    if (acum >= val) break;
    if (e.val <= val - acum) { acum += e.val; count++; }
  }

  const resto = Math.max(0, st - val);
  if (val >= st) {
    el.innerHTML = `✅ Pagamento total — quita aproximadamente <strong>${count} despesa${count!==1?"s":""}</strong> (${fmt(acum)}) · Saldo após: <strong>${fmt(resto)}</strong>`;
  } else {
    el.innerHTML = `⚡ Pagamento parcial — quita aproximadamente <strong>${count} despesa${count!==1?"s":""}</strong> (${fmt(acum)}) · Saldo restante: <strong>${fmt(resto)}</strong>`;
  }
}

async function confirmarPagamento(quemDeve, saldoSugerido) {
  const valor = parseFloat(document.getElementById("pag-valor").value) || 0;
  const data  = document.getElementById("pag-data").value || hoje();
  const obs   = document.getElementById("pag-obs").value.trim();

  if (valor <= 0) { toast("Informe um valor válido"); return; }

  // Define pagador e recebedor como e-mails
  // "eu" → eu pago (G.email → "outra"); "ela" → ela paga ("outra" → G.email)
  const pagadorEmail   = quemDeve === "eu" ? G.email : "outra";
  const recebedorEmail = quemDeve === "eu" ? "outra" : G.email;

  fecharModal();
  load("Registrando pagamento...");
  try {
    const r = await api({
      action    : "registerPayment",
      token     : G.token,
      valor,
      recebedor : recebedorEmail,
      data,
      obs
    });
    if (!r.ok) { toast(r.error || "Erro ao registrar"); return; }

    // Atualiza estado local — recarrega despesas e pagamentos do servidor
    await Promise.all([fetchDespesas(), fetchPagamentos()]);

    toast(`✅ ${r.despesasQuitadas} despesa${r.despesasQuitadas!==1?"s":""} quitada${r.despesasQuitadas!==1?"s":""} · ${fmt(r.valorQuitado)}`);
    renderTab();
  } catch(e) { toast("Erro de conexão"); console.error(e); }
  finally { hideLoad(); }
}

function selecionarTodos(sel) {
  document.querySelectorAll(".quit-chk").forEach(c => { c.checked = sel; });
  atualizarTotalQuit();
}

function atualizarTotalQuit() {
  var total = 0;
  document.querySelectorAll(".quit-chk:checked").forEach(c => { total += parseFloat(c.dataset.val) || 0; });
  const el = document.getElementById("quit-total");
  if (el) el.textContent = fmt(total);
}

async function confirmarQuitacao(mk) {
  const chks = document.querySelectorAll(".quit-chk:checked");
  if (!chks.length) { toast("Selecione ao menos uma despesa"); return; }
  const ids = Array.from(chks).map(c => c.dataset.id);
  fecharModal();
  load("Quitando...");
  try {
    const r = await api({ action:"settleExpenses", token:G.token, ids:ids, month:mk });
    if (!r.ok) { toast(r.error || "Erro ao quitar"); return; }
    // Atualiza estado local
    const idSet = new Set(ids);
    G.expenses.filter(e => idSet.has(e.id)).forEach(e => {
      e.settled = true; e.settledAt = hoje(); e.settledMonth = mk;
    });
    toast(`✅ ${r.settledCount} despesa${r.settledCount>1?"s":""} quitada${r.settledCount>1?"s":""} · ${fmt(r.totalValue||0)}`);
    renderTab();
  } catch(e) { toast("Erro de conexão"); console.error(e); }
  finally { hideLoad(); }
}

function uploadFoto(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e2 => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const sz = Math.min(img.width, img.height, 200);
      canvas.width = sz; canvas.height = sz;
      canvas.getContext("2d").drawImage(img, 0, 0, sz, sz);
      G.profile.photo = canvas.toDataURL("image/jpeg", .75);
      renderTab();
    };
    img.src = e2.target.result;
  };
  reader.readAsDataURL(file);
}

function toggleHist(k)  { G.openHist = G.openHist===k?null:k; renderTab(); }
function irMes(ev,y,m)  { ev.stopPropagation(); G.vy=y; G.vm=m; G.openHist=null; irTab("despesas"); }
function prevMes()      { if(G.vm===1){G.vm=12;G.vy--;}else G.vm--; G.openExp=null; renderTab(); }
function nextMes()      { if(G.vm===12){G.vm=1;G.vy++;}else G.vm++; G.openExp=null; renderTab(); }
function navMes()       { return `<div class="mnav"><button onclick="prevMes()">‹</button><span class="mnl">${MESES[G.vm-1]} ${G.vy}</span><button onclick="nextMes()">›</button></div>`; }
function catById(id)    { return CATS.find(c=>c.id===id)||CATS[5]; }
function fmt(v)         { return "R$\u00A0" + Number(v||0).toFixed(2).replace(".",","); }
function fmtD(s)        { return String(s||"").split("T")[0].split("-").reverse().join("/"); }
function hoje()         { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function mkey(y,m)      { return y+"-"+String(m).padStart(2,"0"); }
function esc(s)         { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function expDoMes(y,m)  { const k=mkey(y,m); return G.expenses.filter(e=>String(e.date).startsWith(k)); }
function nomeUsuario(email) {
  if (!email) return "?";
  if (email === G.email) return "Eu";
  const u = (G.users||[]).find(u=>u.email===email);
  return u&&u.name ? u.name.split(" ")[0] : email.split("@")[0];
}
function calcSaldo(exps) {
  let dMe=0,dSp=0,total=0;
  exps.forEach(e => {
    total += e.val;
    if (e.payer === G.email) dSp += e.val*((100-e.pctMe)/100);
    else dMe += e.val*(e.pctMe/100);
  });
  return { total, dMe, dSp, saldo:dSp-dMe };
}
function load(msg) { document.getElementById("lov-msg").textContent=msg||"Carregando..."; document.getElementById("lov").style.display="flex"; }
function hideLoad()    { document.getElementById("lov").style.display="none"; }
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("on");
  setTimeout(() => el.classList.remove("on"), 2800);
}

// Service Worker para cache offline
if ("serviceWorker" in navigator) {
  const sw = `const C="fc3";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["."]))));self.addEventListener("fetch",e=>{if(e.request.url.includes("script.google.com"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
}
